services:
  postgres:
    image: postgres:16-alpine
    container_name: englishapp-postgres
    environment:
      POSTGRES_USER: englishapp
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: englishapp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishapp -d englishapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: englishapp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: englishapp-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  init-buckets:
    image: minio/mc:latest
    container_name: englishapp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/videos &&
        mc mb --ignore-existing local/audios &&
        mc anonymous set public local/videos &&
        mc anonymous set public local/audios &&
        echo 'Buckets created successfully'
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
