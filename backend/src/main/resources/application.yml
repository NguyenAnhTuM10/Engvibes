spring:
  application:
    name: englishapp-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/englishapp}
    username: ${DATABASE_USER:englishapp}
    password: ${DATABASE_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  cache:
    type: redis
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-32-characters-long-for-hs256}
    expire-hours: ${JWT_EXPIRE_HOURS:24}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
    bucket-videos: ${S3_BUCKET_VIDEOS:videos}
    bucket-audios: ${S3_BUCKET_AUDIOS:audios}
    bucket-recordings: ${S3_BUCKET_RECORDINGS:recordings}
    public-url: ${S3_PUBLIC_URL:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    path-style-access: ${S3_PATH_STYLE:true}
  openai:
    api-key: ${OPENAI_API_KEY:dummy}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    audio-model: ${OPENAI_AUDIO_MODEL:gpt-audio-mini}
    realtime-model: ${OPENAI_REALTIME_MODEL:gpt-realtime-2}
  pronunciation-service:
    url: ${PRONUNCIATION_SERVICE_URL:http://localhost:8000}

